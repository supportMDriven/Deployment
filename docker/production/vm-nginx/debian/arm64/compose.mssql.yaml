name: MDriven

services:
  mssql: # MDriven Server Connection String  --- Server=mssql,1433;Initial Catalog=mdriven_db;Persist Security Info=False;User ID=mdriven;Password=#MDs123456;MultipleActiveResultSets=False;Encrypt=False;TrustServerCertificate=False;Command Timeout=30;
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: on-failure:5

    env_file:
      - ${PROJECT_ROOT:-.}/databases/mssql/mssql.env

    volumes:
      - ./mssql-data/data:/var/opt/mssql/data
      - ./mssql-data/secrets:/var/opt/mssql/secrets
      - ${PROJECT_ROOT:-.}/databases/mssql/init:/usr/config:ro

    entrypoint: ["/bin/sh","/usr/config/entrypoint.sh"]

    ports:
      - 1433:1433
      
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -No -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 6
      start_period: 30s
    

  server-core:
    platform: linux/arm64
    image: mdriven/mdriven-server:debian-arm64

    volumes:
      - type: volume
        source: MDSData
        target: /app

      - type: bind
        source: ${PROJECT_ROOT:-.}/settings/mdriven-server/CommandLineOverride.xml
        target: /app/App_Data/CommandLineOverride.xml
      
      - type: bind
        source: ${PROJECT_ROOT:-.}/settings/mdriven-server/DatabaseVistaDB.vdb6
        target: /app/App_Data/DatabaseVistaDB.vdb6

    depends_on:
      mssql:
        condition: service_healthy
        restart: true
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5011/"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

    environment:
      - PUID=1000
      - PGID=1000
    
    restart: on-failure:5

    entrypoint: ["/bin/sh","/usr/local/bin/entrypoint.sh"]

    command: ["dotnet", "AppCompleteGenericCore.dll"]


  turnkey-core:
    platform: linux/arm64
    image: mdriven/mdriven-turnkey:debian-arm64
    
    volumes:
      - type: volume
        source: MDTData
        target: /app

      - type: bind
        source: ${PROJECT_ROOT:-.}/settings/mdriven-turnkey/CommandLineOverride.xml
        target: /app/App_Data/CommandLineOverride.xml
      
      - type: bind
        source: ${PROJECT_ROOT:-.}/settings/mdriven-turnkey/HardServerUrl.xml
        target: /app/App_Data/HardServerUrl.xml
      
      - type: bind
        source: ${PROJECT_ROOT:-.}/settings/mdriven-turnkey/MDrivenServerOverride.xml
        target: /app/App_Data/MDrivenServerOverride.xml
      
      - type: bind
        source: ${PROJECT_ROOT:-.}/settings/mdriven-turnkey/TurnkeySettingsOverride.xml
        target: /app/App_Data/TurnkeySettingsOverride.xml
    
    depends_on:
      server-core:
        condition: service_healthy
        restart: true

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5012/"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

    environment:
      - PUID=1000
      - PGID=1000
    
    restart: on-failure:5

    entrypoint: ["/bin/sh","/usr/local/bin/entrypoint.sh"]

    command: ["dotnet", "StreaminAppCoreWebApp.dll"]
  
  scm:
    image: lscr.io/linuxserver/code-server:4.109.2-ls317

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - PASSWORD=123456
      - DEFAULT_WORKSPACE=/config/workspace
      - PWA_APPNAME=MDriven-Apps
      - PORT=8080
    
    volumes:
      - type: volume
        source: MDSData
        target: /config/workspace/MDrivenServer
        read_only: false

      - type: volume
        source: MDTData
        target: /config/workspace/MDrivenTurnkey
        read_only: false

    #   - type: bind
    #     source: ${PROJECT_ROOT:-.}/settings/vscode/.config
    #     target: /config/.config
    #     read_only: true
      
    #   - type: bind
    #     source: ${PROJECT_ROOT:-.}/settings/vscode/data/User/settings.json
    #     target: /config/data/User/settings.json
    #     read_only: true

    #   - type: bind
    #     source: ${PROJECT_ROOT:-.}/settings/vscode/extensions/extensions.json
    #     target: /config/extensions/extensions.json
    #     read_only: true
    
    # tmpfs:
    #   - /run:uid=1000,gid=1000,exec,size=64m
    #   - /tmp:size=128m

    # security_opt:
    #   - no-new-privileges=true

    # user: "1000:1000"
    # read_only: true

  nginx:
    image: nginx:alpine
    
    volumes:
      - type: bind
        source: ${PROJECT_ROOT:-.}/settings/nginx-proxy.conf
        target: /etc/nginx/conf.d/default.conf

    depends_on:
      scm:
        condition: service_started
      turnkey-core:
        condition: service_healthy
        restart: true
    
    ports:
      - 5011:5011
      - 5012:5012
      - 8080:8080

volumes:
  MDSData:
  MDTData: