name: Package & Publish Docker Configs

on:
  push:
    branches: [ "main" ]
    paths:
      - "docker/local/**"
      - "docker/production/**"

permissions:
  contents: write # Required for creating releases

env:
  LOCAL_ROOT: docker/local
  VM_ROOT: docker/production/vm-nginx

jobs:
  # --- Local Environments ---
  package-local:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Package Local Variants
        run: |
          package_local() {
            DISTRO=$1
            ARCH=$2
            COMPOSE_SRC=$3
            ZIP_NAME="deploy-local-${DISTRO}-${ARCH}.zip"
            TEMP_DIR="pkg_local_${DISTRO}_${ARCH}"
            
            echo "Packaging $ZIP_NAME..."
            mkdir -p $TEMP_DIR
            cp -r "$LOCAL_ROOT/settings" "$TEMP_DIR/"
            
            # Copy specific compose file as 'docker-compose.yaml'
            cp "$LOCAL_ROOT/$DISTRO/$COMPOSE_SRC" "$TEMP_DIR/docker-compose.yaml"

            cd $TEMP_DIR
            zip -r "../$ZIP_NAME" .
            cd ..
            rm -rf $TEMP_DIR
          }

          package_local "ubuntu" "amd64" "compose.amd64.yaml"
          package_local "ubuntu" "arm64" "compose.arm64.yaml"
          package_local "debian" "amd64" "compose.amd64.yaml"
          package_local "debian" "arm64" "compose.arm64.yaml"
          package_local "alpine" "amd64" "compose.amd64.yaml"

      - name: Upload Temp Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-local-configs
          path: deploy-local-*.zip
          retention-days: 1

  # --- VM: Standard (Embedded Database) ---
  package-vm-standard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Package VM Standard
        run: |
          package_vm() {
            DISTRO=$1
            ARCH=$2
            FILE_NAME="compose.prod.yaml"
            ZIP_NAME="deploy-vm-standard-${DISTRO}-${ARCH}.zip"
            TEMP_DIR="pkg_vm_std_${DISTRO}_${ARCH}"
            
            echo "Packaging $ZIP_NAME..."
            mkdir -p $TEMP_DIR
            cp -r "$VM_ROOT/settings" "$TEMP_DIR/"

            # Copy Compose File from: docker/production/vm-nginx/ubuntu/amd64/
            cp "$VM_ROOT/$DISTRO/$ARCH/$FILE_NAME" "$TEMP_DIR/docker-compose.yaml"

            cd $TEMP_DIR
            zip -r "../$ZIP_NAME" .
            cd ..
            rm -rf $TEMP_DIR
          }

          package_vm "ubuntu" "amd64"
          package_vm "ubuntu" "arm64"
          package_vm "debian" "amd64"
          package_vm "debian" "arm64"
          package_vm "alpine" "amd64"

      - name: Upload Temp Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-vm-standard-configs
          path: deploy-vm-standard-*.zip
          retention-days: 1  
  
  # --- VM: MYSQL VARIANTS ---
  package-vm-mysql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Package VM MySQL
        run: |
          package_mysql() {
            DISTRO=$1
            ARCH=$2
            FILE_NAME="compose.mysql.yaml"
            ZIP_NAME="deploy-vm-mysql-${DISTRO}-${ARCH}.zip"
            TEMP_DIR="pkg_vm_mysql_${DISTRO}_${ARCH}"
            
            echo "Packaging $ZIP_NAME..."
            mkdir -p $TEMP_DIR
            cp -r "$VM_ROOT/settings" "$TEMP_DIR/"

            # Include MySQL scripts
            mkdir -p $TEMP_DIR/databases
            cp -r $VM_ROOT/databases/mysql $TEMP_DIR/databases/

            cp "$VM_ROOT/$DISTRO/$ARCH/$FILE_NAME" "$TEMP_DIR/docker-compose.yaml"

            cd $TEMP_DIR
            zip -r "../$ZIP_NAME" .
            cd ..
            rm -rf $TEMP_DIR
          }

          package_mysql "ubuntu" "amd64"
          package_mysql "ubuntu" "arm64"
          package_mysql "debian" "amd64"
          package_mysql "debian" "arm64"
          package_mysql "alpine" "amd64"
          

      - name: Upload Temp Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-vm-mysql-configs
          path: deploy-vm-mysql-*.zip  
  
  # --- VM: POSTGRES VARIANTS ---
  package-vm-postgres:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Package VM Postgres
        run: |
          package_pg() {
            DISTRO=$1
            ARCH=$2
            FILE_NAME="compose.postgres.yaml"
            ZIP_NAME="deploy-vm-postgres-${DISTRO}-${ARCH}.zip"
            TEMP_DIR="pkg_vm_pg_${DISTRO}_${ARCH}"
            
            echo "Packaging $ZIP_NAME..."
            mkdir -p $TEMP_DIR
            cp -r "$VM_ROOT/settings" "$TEMP_DIR/"

            # Include Postgres scripts
            mkdir -p $TEMP_DIR/databases
            cp -r $VM_ROOT/databases/postgres $TEMP_DIR/databases/

            cp "$VM_ROOT/$DISTRO/$ARCH/$FILE_NAME" "$TEMP_DIR/docker-compose.yaml"

            cd $TEMP_DIR
            zip -r "../$ZIP_NAME" .
            cd ..
            rm -rf $TEMP_DIR
          }

          package_pg "ubuntu" "amd64"
          package_pg "ubuntu" "arm64"
          package_pg "debian" "amd64"
          package_pg "debian" "arm64"
          package_pg "alpine" "amd64"

      - name: Upload Temp Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-vm-postgres-configs
          path: deploy-vm-postgres-*.zip  

  # --- VM: MSSQL VARIANTS ---
  package-vm-mssql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Package VM MSSQL
        run: |
          package_mssql() {
            DISTRO=$1
            ARCH=$2
            FILE_NAME="compose.mssql.yaml"
            ZIP_NAME="deploy-vm-mssql-${DISTRO}-${ARCH}.zip"
            TEMP_DIR="pkg_vm_mssql_${DISTRO}_${ARCH}"
            
            echo "Packaging $ZIP_NAME..."
            mkdir -p $TEMP_DIR
            cp -r "$VM_ROOT/settings" "$TEMP_DIR/"

            # Include MSSQL scripts
            mkdir -p $TEMP_DIR/databases
            cp -r $VM_ROOT/databases/mssql $TEMP_DIR/databases/

            cp "$VM_ROOT/$DISTRO/$ARCH/$FILE_NAME" "$TEMP_DIR/docker-compose.yaml"

            cd $TEMP_DIR
            zip -r "../$ZIP_NAME" .
            cd ..
            rm -rf $TEMP_DIR
          }

          package_mssql "ubuntu" "amd64"
          package_mssql "ubuntu" "arm64"
          package_mssql "debian" "amd64"
          package_mssql "debian" "arm64"
          package_mssql "alpine" "amd64"
          

      - name: Upload Temp Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-vm-mssql-configs
          path: deploy-vm-mssql-*.zip  
  
          
  publish:
    needs: [package-local, package-vm-standard, package-vm-mysql, package-vm-postgres, package-vm-mssql]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-* # Matches all 6 artifacts
          merge-multiple: true # Dumps all 6 zips into one folder
          path: ./release_assets

      - name: Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest-configs
          name: "Latest Docker Configurations"
          files: release_assets/*.zip
          prerelease: false